<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="620" rx="12" fill="url(#bg)" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#212529">🗺️ Distribuição Regional — Taxa de Sintomáticos</text>
  <text x="300" y="58" text-anchor="middle" font-size="13" fill="#6c757d">PNAD-COVID-19 · Novembro/2020</text>

  <!-- NORTE - large region at top -->
  <path d="M120,100 L370,80 L420,100 L440,150 L420,210 L380,240 L320,260 L260,260 L200,250 L150,230 L110,190 L100,150 Z"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <text x="270" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#F57F17">NORTE</text>
  <text x="270" y="180" text-anchor="middle" font-size="20" font-weight="800" fill="#E65100">2,29%</text>
  <circle cx="320" cy="175" r="8" fill="#FDD835"/>
  <text x="270" y="198" text-anchor="middle" font-size="10" fill="#795548">▼ queda contínua</text>

  <!-- NORDESTE - right side -->
  <path d="M320,260 L380,240 L440,250 L480,230 L510,260 L520,310 L510,360 L480,400 L440,410 L400,390 L360,380 L330,350 L310,310 Z"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <text x="420" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#F57F17">NORDESTE</text>
  <text x="420" y="332" text-anchor="middle" font-size="20" font-weight="800" fill="#E65100">2,18%</text>
  <circle cx="472" cy="327" r="8" fill="#FDD835"/>
  <text x="420" y="350" text-anchor="middle" font-size="10" fill="#795548">leve retomada</text>

  <!-- CENTRO-OESTE - center -->
  <path d="M150,260 L260,260 L310,310 L330,350 L320,400 L290,430 L240,440 L190,430 L150,400 L130,350 L120,300 Z"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <text x="225" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#F57F17">CENTRO-</text>
  <text x="225" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#F57F17">OESTE</text>
  <text x="225" y="380" text-anchor="middle" font-size="20" font-weight="800" fill="#E65100">2,19%</text>
  <circle cx="280" cy="375" r="8" fill="#FDD835"/>
  <text x="225" y="398" text-anchor="middle" font-size="10" fill="#795548">▼ queda contínua</text>

  <!-- SUDESTE - right-center -->
  <path d="M330,350 L360,380 L400,390 L440,410 L450,440 L440,480 L400,500 L350,490 L310,470 L280,440 L290,430 L320,400 Z"
        fill="#FFE0B2" stroke="#FB8C00" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <text x="370" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">SUDESTE</text>
  <text x="370" y="458" text-anchor="middle" font-size="20" font-weight="800" fill="#BF360C">2,36%</text>
  <circle cx="422" cy="452" r="8" fill="#FF9800"/>
  <text x="370" y="476" text-anchor="middle" font-size="10" fill="#D84315">▲ +0,48 p.p. 🔴</text>

  <!-- SUL - bottom -->
  <path d="M240,440 L310,470 L350,490 L360,520 L340,550 L300,565 L260,560 L230,540 L210,510 L200,470 Z"
        fill="#FFCDD2" stroke="#E53935" stroke-width="2.5" filter="url(#shadow)" opacity="0.95"/>
  <text x="280" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">SUL</text>
  <text x="280" y="528" text-anchor="middle" font-size="20" font-weight="800" fill="#B71C1C">2,58%</text>
  <circle cx="332" cy="523" r="8" fill="#E53935"/>
  <text x="280" y="546" text-anchor="middle" font-size="10" fill="#B71C1C">▲ +0,57 p.p. 🔴</text>

  <!-- Legend -->
  <rect x="30" y="572" width="540" height="38" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <circle cx="70" cy="591" r="8" fill="#E53935"/>  <text x="84" y="595" font-size="11" fill="#424242">&gt; 2,50% (Alerta)</text>
  <circle cx="210" cy="591" r="8" fill="#FF9800"/>  <text x="224" y="595" font-size="11" fill="#424242">2,30–2,50%</text>
  <circle cx="340" cy="591" r="8" fill="#FDD835"/>  <text x="354" y="595" font-size="11" fill="#424242">&lt; 2,30%</text>
  <text x="480" y="595" font-size="10" fill="#9e9e9e">Δ Out→Nov</text>
</svg>
